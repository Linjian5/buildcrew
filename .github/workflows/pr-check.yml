name: PR Title Check

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const pattern = /^(feat|fix|chore|docs|test|refactor|perf|ci|style|build|revert)(\(.+\))?:\s.+/;

            if (!pattern.test(title)) {
              core.setFailed(
                `PR title "${title}" does not match the required format.\n` +
                `Expected: <type>(<scope>): <description>\n` +
                `Types: feat, fix, chore, docs, test, refactor, perf, ci, style, build, revert\n` +
                `Example: "feat(agents): add heartbeat endpoint"`
              );
            } else {
              core.info(`PR title "${title}" is valid.`);
            }
